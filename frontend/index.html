<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assinador Digital</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #ede9fe;
      --text: #1e1b4b;
      --muted: #6b7280;
      --border: #e5e7eb;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      --success-text: #15803d;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #dc2626;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(79,70,229,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo h1 { font-size: 20px; color: var(--text); font-weight: 700; }
    .logo p { font-size: 12px; color: var(--muted); }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 8px; border: none; background: transparent;
      border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--muted); transition: all .2s;
    }
    .tab.ativo { background: white; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .2s; margin-bottom: 14px;
    }
    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%; padding: 11px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: var(--primary-dark); }

    .msg {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-top: 14px; display: none;
    }
    .ok  { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
    .err { background: var(--error-bg);   border: 1px solid var(--error-border);   color: var(--error-text); }

    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .footer-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <h1>Assinador Digital</h1>
      <p>Assine documentos com criptografia RSA</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab ativo" onclick="aba('login')">Entrar</button>
    <button class="tab"       onclick="aba('cadastro')">Cadastrar</button>
  </div>

  <div id="login">
    <label>E-mail ou usuário</label>
    <input type="text" id="lEmail" placeholder="seu@email.com ou username">
    <label>Senha</label>
    <input type="password" id="lSenha" placeholder="••••••••">
    <button class="btn" onclick="entrar()">Entrar</button>
  </div>

  <div id="cadastro" style="display:none">
    <label>Username</label>
    <input type="text" id="cUser" placeholder="seunome">
    <label>E-mail</label>
    <input type="email" id="cEmail" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="cSenha" placeholder="••••••••">
    <button class="btn" onclick="cadastrar()">Criar conta</button>
  </div>

  <div id="msg" class="msg"></div>

  <div class="footer-link">
    <a href="/verify.html">Verificar uma assinatura →</a>
  </div>
</div>

<script>
  if (localStorage.getItem('jwt')) location.href = '/sign.html';

  function aba(qual) {
    document.getElementById('login').style.display    = qual === 'login'    ? '' : 'none';
    document.getElementById('cadastro').style.display = qual === 'cadastro' ? '' : 'none';
    document.querySelectorAll('.tab').forEach((b, i) =>
      b.classList.toggle('ativo', (qual === 'login' && i === 0) || (qual === 'cadastro' && i === 1))
    );
  }

  function msg(texto, tipo) {
    const el = document.getElementById('msg');
    el.textContent = texto; el.className = 'msg ' + tipo; el.style.display = 'block';
  }

  async function cadastrar() {
    const res  = await fetch('/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('cUser').value,
        email:    document.getElementById('cEmail').value,
        password: document.getElementById('cSenha').value
      })
    });
    const data = await res.json();
    res.ok ? (msg('Conta criada! Faça login.', 'ok'), aba('login')) : msg(data.erro, 'err');
  }

  async function entrar() {
    const res  = await fetch('/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('lEmail').value,
        password: document.getElementById('lSenha').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('jwt', data.token);
      localStorage.setItem('user', data.username);
      location.href = '/sign.html';
    } else msg(data.erro, 'err');
  }
</script>
</body>
</html>
